<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="https://www.gstatic.com/classroom/favicon.png" />
    <title>Google Classroom</title>
    <meta name="description" content="Google Classroom" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Force fresh load when app version changes -->
    <script>
      (function() {
        var V = 'schooly-v20260313-1';
        if (localStorage.getItem('_sv') !== V) {
          localStorage.setItem('_sv', V);
          if (window.location.search.indexOf('_r=1') === -1) {
            window.location.replace(window.location.pathname + (window.location.search ? window.location.search + '&_r=1' : '?_r=1'));
          }
        }
      })();
    </script>
    <!-- Ultraviolet core scripts - load before app -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Ultraviolet setup script - use non-module to avoid Vite processing -->
    <script>
      (async function() {
        try {
          if (!('serviceWorker' in navigator)) {
            console.warn('[UV] Service workers not supported');
            window.__uvReady = false;
            window.dispatchEvent(new Event('uvready'));
            return;
          }
          
          console.log('[UV] Starting setup...');
          
          // Dynamic import using Function to bypass Vite
          const importFn = new Function('url', 'return import(url)');
          const bareModule = await importFn('/baremux/index.mjs');
          const BareMuxConnection = bareModule.BareMuxConnection;
          
          if (!BareMuxConnection) {
            throw new Error('BareMuxConnection not found. Available: ' + Object.keys(bareModule).join(', '));
          }
          
          const wispUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/wisp/';
          const connection = new BareMuxConnection('/baremux/worker.js');
          
          // Expose reinitUV so the app can reconnect when Wisp drops (MuxTaskEnded, etc.)
          window.__reinitUV = async function() {
            try {
              console.log('[UV] Reinitialising Wisp connection...');
              await connection.setTransport('/epoxy/index.mjs', [{ wisp: wispUrl }]);
              console.log('[UV] Wisp reconnected');
              return true;
            } catch(e) {
              console.error('[UV] Reinit failed:', e.message);
              return false;
            }
          };
          
          await connection.setTransport('/epoxy/index.mjs', [{ wisp: wispUrl }]);
          console.log('[UV] Transport set');
          
          const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/service/' });
          console.log('[UV] SW registered:', registration.scope);
          
          if (registration.installing) {
            await new Promise((resolve) => {
              registration.installing.addEventListener('statechange', function() {
                if (this.state === 'activated') resolve();
              });
            });
          }
          
          console.log('[UV] Setup complete!');
          window.__uvReady = true;
          window.dispatchEvent(new Event('uvready'));
        } catch (err) {
          console.error('[UV] Setup failed:', err.message || err);
          window.__uvReady = false;
          window.dispatchEvent(new Event('uvready'));
        }
      })();
    </script>
  </body>
</html>
