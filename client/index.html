<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>School-y</title>
    <meta name="description" content="School-y - Search the web and browse freely." />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Force fresh load when app version changes -->
    <script>
      (function() {
        var V = 'schooly-v20260312-5';
        if (localStorage.getItem('_sv') !== V) {
          localStorage.setItem('_sv', V);
          if (window.location.search.indexOf('_r=1') === -1) {
            window.location.replace(window.location.pathname + (window.location.search ? window.location.search + '&_r=1' : '?_r=1'));
          }
        }
      })();
    </script>
    <!-- Ultraviolet core scripts - load before app -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Ultraviolet setup script - use non-module to avoid Vite processing -->
    <script>
      (async function() {
        try {
          if (!('serviceWorker' in navigator)) {
            console.warn('[UV] Service workers not supported');
            window.__uvReady = false;
            window.dispatchEvent(new Event('uvready'));
            return;
          }
          
          console.log('[UV] Starting setup...');
          
          // Dynamic import using Function to bypass Vite
          const importFn = new Function('url', 'return import(url)');
          console.log('[UV] Loading BareMux...');
          const bareModule = await importFn('/baremux/index.mjs');
          console.log('[UV] BareMux loaded:', Object.keys(bareModule));
          const BareMuxConnection = bareModule.BareMuxConnection;
          
          if (!BareMuxConnection) {
            throw new Error('BareMuxConnection not found in module. Available exports: ' + Object.keys(bareModule).join(', '));
          }
          
          // Create connection and set transport
          const wispUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/wisp/';
          console.log('[UV] Wisp URL:', wispUrl);
          const connection = new BareMuxConnection('/baremux/worker.js');
          console.log('[UV] Connection created');
          
          // Test Wisp connectivity before enabling UV
          const wispWorks = await new Promise((resolve) => {
            try {
              const testWs = new WebSocket(wispUrl);
              const timer = setTimeout(() => { testWs.close(); resolve(false); }, 4000);
              testWs.onopen = () => { clearTimeout(timer); testWs.close(); resolve(true); };
              testWs.onerror = () => { clearTimeout(timer); resolve(false); };
            } catch(e) { resolve(false); }
          });
          
          if (!wispWorks) {
            console.warn('[UV] Wisp test failed - using legacy proxy instead');
            window.__uvReady = false;
            window.dispatchEvent(new Event('uvready'));
            return;
          }
          
          await connection.setTransport('/epoxy/index.mjs', [{ wisp: wispUrl }]);
          console.log('[UV] Transport set');
          
          // Register service worker
          console.log('[UV] Registering SW...');
          const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/service/' });
          console.log('[UV] SW registered:', registration.scope);
          
          // Wait for SW to be active (don't use navigator.serviceWorker.ready - it only works for pages in SW scope)
          if (registration.installing) {
            console.log('[UV] SW installing...');
            await new Promise((resolve) => {
              registration.installing.addEventListener('statechange', function() {
                if (this.state === 'activated') {
                  console.log('[UV] SW activated');
                  resolve();
                }
              });
            });
          } else if (registration.waiting) {
            console.log('[UV] SW waiting, skipping to claims...');
          } else if (registration.active) {
            console.log('[UV] SW already active');
          }
          
          console.log('[UV] Setup complete!');
          window.__uvReady = true;
          window.dispatchEvent(new Event('uvready'));
        } catch (err) {
          console.error('[UV] Setup failed:', err.message || err, err.stack || '');
          window.__uvReady = false;
          window.dispatchEvent(new Event('uvready'));
        }
      })();
    </script>
  </body>
</html>
